services:
  postgres:
    image: postgres:17-alpine
    container_name: arc-forge-ai-postgres-local
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: arcforge_ai
      POSTGRES_USER: arcforge
      POSTGRES_PASSWORD: arcforge
    volumes:
      - arc-forge-ai-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arcforge -d arcforge_ai"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  app:
    image: node:22-bookworm-slim
    container_name: arc-forge-ai-app-local
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      APP_ENV: local
      NEXT_PUBLIC_APP_ENV: local
      DATABASE_URL: postgresql://arcforge:arcforge@postgres:5432/arcforge_ai?schema=public
      AUTH_SESSION_COOKIE_NAME: arc_forge_session
      APP_URL: http://localhost:3000
      NEXT_PUBLIC_REALTIME_URL: ws://localhost:3001/ws
      NEXT_TELEMETRY_DISABLED: "1"
      INTERNAL_REALTIME_TOKEN_SECRET: arc-forge-local-realtime-secret-change-me
      INTERNAL_REALTIME_SERVICE_SECRET: arc-forge-local-realtime-service-secret-change-me
      INTERNAL_REALTIME_INTERNAL_URL: http://realtime:3001/internal/broadcast
      STORAGE_PROVIDER: local_fs
      LOCAL_STORAGE_ROOT: /app/.local-storage
      AI_PROVIDER: mock
    volumes:
      - .:/app
      - ./.local-storage:/app/.local-storage
      - arc-forge-ai-node-modules:/app/node_modules
      - arc-forge-ai-next-cache:/app/.next
    command: >
      sh -c "set -a &&
      [ ! -f .env.local ] || . ./.env.local &&
      set +a &&
      export APP_ENV=local &&
      export NEXT_PUBLIC_APP_ENV=local &&
      export DATABASE_URL='postgresql://arcforge:arcforge@postgres:5432/arcforge_ai?schema=public' &&
      export APP_URL='http://localhost:3000' &&
      export NEXT_PUBLIC_REALTIME_URL='ws://localhost:3001/ws' &&
      export NEXT_TELEMETRY_DISABLED=1 &&
      export INTERNAL_REALTIME_TOKEN_SECRET=$${INTERNAL_REALTIME_TOKEN_SECRET:-arc-forge-local-realtime-secret-change-me} &&
      export INTERNAL_REALTIME_SERVICE_SECRET=$${INTERNAL_REALTIME_SERVICE_SECRET:-arc-forge-local-realtime-service-secret-change-me} &&
      export INTERNAL_REALTIME_INTERNAL_URL='http://realtime:3001/internal/broadcast' &&
      export STORAGE_PROVIDER='local_fs' &&
      export LOCAL_STORAGE_ROOT='/app/.local-storage' &&
      export AI_PROVIDER='mock' &&
      npm install &&
      npx prisma generate &&
      npx prisma migrate deploy &&
      npm run dev -- -H 0.0.0.0 -p 3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/sign-up').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  worker:
    image: node:22-bookworm-slim
    container_name: arc-forge-ai-worker-local
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_healthy
    restart: unless-stopped
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql://arcforge:arcforge@postgres:5432/arcforge_ai?schema=public
      AUTH_SESSION_COOKIE_NAME: arc_forge_session
      APP_URL: http://localhost:3000
      NEXT_TELEMETRY_DISABLED: "1"
      INTERNAL_REALTIME_SERVICE_SECRET: arc-forge-local-realtime-service-secret-change-me
      INTERNAL_REALTIME_INTERNAL_URL: http://realtime:3001/internal/broadcast
      STORAGE_PROVIDER: local_fs
      LOCAL_STORAGE_ROOT: /app/.local-storage
      AI_PROVIDER: mock
    volumes:
      - .:/app
      - ./.local-storage:/app/.local-storage
      - arc-forge-ai-node-modules:/app/node_modules
    command: >
      sh -c "set -a &&
      [ ! -f .env.local ] || . ./.env.local &&
      set +a &&
      export APP_ENV=local &&
      export DATABASE_URL='postgresql://arcforge:arcforge@postgres:5432/arcforge_ai?schema=public' &&
      export APP_URL='http://localhost:3000' &&
      export NEXT_TELEMETRY_DISABLED=1 &&
      export INTERNAL_REALTIME_SERVICE_SECRET=$${INTERNAL_REALTIME_SERVICE_SECRET:-arc-forge-local-realtime-service-secret-change-me} &&
      export INTERNAL_REALTIME_INTERNAL_URL='http://realtime:3001/internal/broadcast' &&
      export STORAGE_PROVIDER='local_fs' &&
      export LOCAL_STORAGE_ROOT='/app/.local-storage' &&
      export AI_PROVIDER='mock' &&
      npm run ai:worker"

  realtime:
    image: node:22-bookworm-slim
    container_name: arc-forge-ai-realtime-local
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql://arcforge:arcforge@postgres:5432/arcforge_ai?schema=public
      REALTIME_PORT: "3001"
      APP_URL: http://localhost:3000
      NEXT_PUBLIC_REALTIME_URL: ws://localhost:3001/ws
      NEXT_TELEMETRY_DISABLED: "1"
      INTERNAL_REALTIME_TOKEN_SECRET: arc-forge-local-realtime-secret-change-me
      INTERNAL_REALTIME_SERVICE_SECRET: arc-forge-local-realtime-service-secret-change-me
    volumes:
      - .:/app
      - arc-forge-ai-node-modules:/app/node_modules
    command: >
      sh -c "set -a &&
      [ ! -f .env.local ] || . ./.env.local &&
      set +a &&
      export APP_ENV=local &&
      export DATABASE_URL='postgresql://arcforge:arcforge@postgres:5432/arcforge_ai?schema=public' &&
      export APP_URL='http://localhost:3000' &&
      export REALTIME_PORT=3001 &&
      export NEXT_PUBLIC_REALTIME_URL='ws://localhost:3001/ws' &&
      export NEXT_TELEMETRY_DISABLED=1 &&
      export INTERNAL_REALTIME_TOKEN_SECRET=$${INTERNAL_REALTIME_TOKEN_SECRET:-arc-forge-local-realtime-secret-change-me} &&
      export INTERNAL_REALTIME_SERVICE_SECRET=$${INTERNAL_REALTIME_SERVICE_SECRET:-arc-forge-local-realtime-service-secret-change-me} &&
      npm run realtime:server"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 10s

volumes:
  arc-forge-ai-postgres-data:
  arc-forge-ai-node-modules:
  arc-forge-ai-next-cache:
